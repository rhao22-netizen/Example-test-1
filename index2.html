<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Na2O–B2O3–SiO2 RUPF Calculator</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.container{
background:white;
padding:30px;
max-width:800px;
margin:auto;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

input{
padding:8px;
margin:5px;
}

button{
padding:10px 20px;
background:#2c7be5;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:16px;
}
</style>

</head>

<body>

<div class="container">

<h2>Na₂O–B₂O₃–SiO₂ Glass Structure Calculator</h2>

<label>Na₂O fraction (y)</label> <input id="y" type="number" step="0.01">

<label>B₂O₃ fraction (x)</label> <input id="x" type="number" step="0.01">

<label>Density (g/cm³)</label> <input id="rho" type="number" step="0.01">

<br><br>

<button onclick="calc()">Calculate</button>

<div class="result" id="result"></div>

</div>

<script>

function sphere(r){
return (4/3)*Math.PI*Math.pow(r,3);
}

function calc(){

let x=parseFloat(document.getElementById("x").value);
let y=parseFloat(document.getElementById("y").value);
let rho=parseFloat(document.getElementById("rho").value);

let Na2O=y;
let B2O3=(1-y)*x;
let SiO2=(1-y)*(1-x);

/* Dell-Bray Boron model */

let R=B2O3>0?Na2O/B2O3:0;

let N4;

if(R<=0.5){N4=R;}
else if(R<=1){N4=0.5;}
else{N4=1/R;}

let B3=1-N4;

/* molar mass */

let M = Na2O*61.98 + B2O3*69.62 + SiO2*60.09;

let Vm=M/rho;

/* ionic radii (Å) */

let rO=1.40;
let rSi=0.26;
let rB3=0.11;
let rB4=0.25;
let rNa=1.02;

/* oxygen count */

let O_total = Na2O + 3*B2O3 + 2*SiO2;

/* oxygen packing */

let Ox_APF=(O_total*sphere(rO))/(Vm*1e24);

/* RUPF */

let B_total=2*B2O3;

let atoms =
SiO2*sphere(rSi)+
(B_total*B3)*sphere(rB3)+
(B_total*N4)*sphere(rB4)+
(2*Na2O)*sphere(rNa)+
O_total*sphere(rO);

let RUPF=atoms/(Vm*1e24);

document.getElementById("result").innerHTML=

"Fraction of 3-coordinated B = "+B3.toFixed(4)+"<br>"+
"ηM (Ox_APF) = "+Ox_APF.toFixed(4)+"<br>"+
"ηRUPF = "+RUPF.toFixed(4);

}

</script>

</body>
</html>
