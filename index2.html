<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<title>Na2O–B2O3–SiO2 Glass Calculator</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.container{
background:white;
padding:30px;
max-width:900px;
margin:auto;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

input{
padding:8px;
margin:5px;
}

button{
padding:10px 20px;
background:#2c7be5;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

table{
margin-top:20px;
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ccc;
padding:6px;
text-align:center;
}
</style>

</head>

<body>

<div class="container">

<h2>Na₂O–B₂O₃–SiO₂ Glass Structure Calculator</h2>

<p>Input Na₂O fraction and density</p>

<label>Na₂O fraction (y)</label> <input id="y" type="number" step="0.01">

<label>Density (g/cm³)</label> <input id="rho" type="number" step="0.01">

<br><br>

<button onclick="generate()">Generate Table</button>

<div id="result"></div>

</div>

<script>

function sphere(r){
return (4/3)*Math.PI*Math.pow(r,3);
}

function generate(){

let y=parseFloat(document.getElementById("y").value);
let rho=parseFloat(document.getElementById("rho").value);

let rO=1.40;
let rSi=0.26;
let rB3=0.11;
let rB4=0.25;
let rNa=1.02;

let table="<table><tr><th>x</th><th>B3 Fraction</th><th>Ox_APF</th><th>RUPF</th></tr>";

for(let i=0;i<=10;i++){

let x=i/10;

let Na2O=y;
let B2O3=(1-y)*x;
let SiO2=(1-y)*(1-x);

let R=Na2O/B2O3;

let N4;

if(R<=0.5){
N4=R;
}
else if(R<=1){
N4=0.5;
}
else{
N4=1/R;
}

let N3=1-N4;

let B_total=2*B2O3;
let B4=B_total*N4;
let B3=B_total*N3;

let O_total=Na2O + 3*B2O3 + 2*SiO2;

let M=Na2O*61.98 + B2O3*69.62 + SiO2*60.09;

let Vm=M/rho;

let Ox_APF=(O_total*sphere(rO))/(Vm*1e24);

let atoms=
SiO2*sphere(rSi)+
B3*sphere(rB3)+
B4*sphere(rB4)+
(2*Na2O)*sphere(rNa)+
O_total*sphere(rO);

let RUPF=atoms/(Vm*1e24);

table+="<tr>";
table+="<td>"+x.toFixed(1)+"</td>";
table+="<td>"+N3.toFixed(3)+"</td>";
table+="<td>"+Ox_APF.toFixed(4)+"</td>";
table+="<td>"+RUPF.toFixed(4)+"</td>";
table+="</tr>";

}

table+="</table>";

document.getElementById("result").innerHTML=table;

}

</script>

</body>

</html>
