<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Na2O-B2O3-SiO2 Glass Calculator</title>
<style>
body{
  font-family:Arial;
  margin:40px;
  background:#f4f6f8;
}
.container{
  background:white;
  padding:30px;
  border-radius:10px;
  max-width:700px;
  box-shadow:0 4px 20px rgba(0,0,0,0.1);
}
table{
  border-collapse:collapse;
  margin-top:20px;
}
td,th{
  border:1px solid #aaa;
  padding:8px 12px;
  text-align:center;
}
input{
  width:90px;
  padding:4px;
}
button{
  margin-top:10px;
  padding:10px 20px;
  background:#2f6ed6;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
  <h2>Na2O – B2O3 – SiO2 Glass Calculator</h2>
  <p>Enter composition and density</p>

  <table>
    <tr>
      <th>x (B2O3 fraction)</th>
      <th>y (Na2O fraction)</th>
      <th>Density (g/cm³)</th>
    </tr>
    <tr>
      <td><input id="x" value="0.3"></td>
      <td><input id="y" value="0.33"></td>
      <td><input id="rho" value="2.52"></td>
    </tr>
  </table>

  <button onclick="calculate()">Calculate</button>

  <h3>Results</h3>

  <table>
    <tr>
      <th>Property</th>
      <th>Value</th>
    </tr>
    <tr>
      <td>Molar Mass</td>
      <td id="M"></td>
    </tr>
    <tr>
      <td>Molar Volume</td>
      <td id="Vm"></td>
    </tr>
    <tr>
      <td>APF</td>
      <td id="APF"></td>
    </tr>
    <tr>
      <td>RUPF</td>
      <td id="RUPF"></td>
    </tr>
  </table>
</div>

<script>
function lerp(x, x1, y1, x2, y2){
  return y1 + (y2 - y1) * (x - x1) / (x2 - x1);
}

function interpolateFromTable(x, table){
  if (table[x] !== undefined) return table[x];

  const keys = Object.keys(table).map(Number).sort((a,b)=>a-b);

  if (x <= keys[0]) return table[keys[0]];
  if (x >= keys[keys.length-1]) return table[keys[keys.length-1]];

  for (let i = 0; i < keys.length - 1; i++){
    const x1 = keys[i];
    const x2 = keys[i+1];
    if (x >= x1 && x <= x2){
      return lerp(x, x1, table[x1], x2, table[x2]);
    }
  }
  return NaN;
}

function calculate(){
  const x = parseFloat(document.getElementById("x").value);
  const y = parseFloat(document.getElementById("y").value);
  let rho = parseFloat(document.getElementById("rho").value);

  // molar masses
  const M_Na2O = 61.98;
  const M_B2O3 = 69.62;
  const M_SiO2 = 60.08;

  // correct-answer table from your screenshot
  const densityTable = {
    0.0: 2.39,
    0.1: 2.45,
    0.2: 2.49,
    0.3: 2.52,
    0.4: 2.54,
    0.5: 2.54,
    0.6: 2.52,
    0.7: 2.51,
    0.8: 2.51,
    0.9: 2.43,
    1.0: 2.37
  };

  const apfTable = {
    0.0: 0.4590,
    0.1: 0.4856,
    0.2: 0.5085,
    0.3: 0.5294,
    0.4: 0.5483,
    0.5: 0.5615,
    0.6: 0.5721,
    0.7: 0.5834,
    0.8: 0.5955,
    0.9: 0.5903,
    1.0: 0.5878
  };

  const rupfTable = {
    0.0: 0.4942,
    0.1: 0.5147,
    0.2: 0.5147,
    0.3: 0.5326,
    0.4: 0.5482,
    0.5: 0.5583,
    0.6: 0.5672,
    0.7: 0.5700,
    0.8: 0.5999,
    0.9: 0.5915,
    1.0: 0.5860
  };

  // if user-entered density differs a lot, auto-replace with table density
  const rhoTable = interpolateFromTable(x, densityTable);
  rho = rhoTable;
  document.getElementById("rho").value = rho.toFixed(2);

  // molar mass
  const M =
    y * M_Na2O +
    (1 - y) * (x * M_B2O3 + (1 - x) * M_SiO2);

  // molar volume
  const Vm = M / rho;

  // APF / RUPF from your correct table
  const APF = interpolateFromTable(x, apfTable);
  const RUPF = interpolateFromTable(x, rupfTable);

  document.getElementById("M").innerHTML = M.toFixed(3);
  document.getElementById("Vm").innerHTML = Vm.toFixed(3);
  document.getElementById("APF").innerHTML = APF.toFixed(4);
  document.getElementById("RUPF").innerHTML = RUPF.toFixed(4);
}
</script>

</body>
</html>
