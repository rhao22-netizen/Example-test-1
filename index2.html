<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Na2O-B2O3-SiO2 Glass Calculator</title>

<style>

body{
font-family:Arial;
margin:40px;
background:#f4f6f8;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:700px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
}

table{
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #aaa;
padding:8px 12px;
text-align:center;
}

input{
width:90px;
padding:4px;
}

button{
margin-top:10px;
padding:10px 20px;
background:#2f6ed6;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Na₂O – B₂O₃ – SiO₂ Glass Calculator</h2>

<p>Enter composition and density</p>

<table>

<tr>
<th>x (B₂O₃ fraction)</th>
<th>y (Na₂O fraction)</th>
<th>Density (g/cm³)</th>
</tr>

<tr>
<td><input id="x" value="0.3"></td>
<td><input id="y" value="0.33"></td>
<td><input id="rho" value="2.52"></td>
</tr>

</table>

<button onclick="calculate()">Calculate</button>

<h3>Results</h3>

<table>

<tr>
<th>Property</th>
<th>Value</th>
</tr>

<tr>
<td>Molar Mass</td>
<td id="M"></td>
</tr>

<tr>
<td>Molar Volume</td>
<td id="Vm"></td>
</tr>

<tr>
<td>Packing Volume</td>
<td id="Vt"></td>
</tr>

<tr>
<td>APF</td>
<td id="APF"></td>
</tr>

<tr>
<td>RUPF</td>
<td id="RUPF"></td>
</tr>

</table>

</div>


<script>

function calculate(){

let x=parseFloat(document.getElementById("x").value)
let y=parseFloat(document.getElementById("y").value)
let rho=parseFloat(document.getElementById("rho").value)


// molar masses

const M_Na2O = 61.98
const M_B2O3 = 69.62
const M_SiO2 = 60.08


// molar mass calculation

let M =
y*M_Na2O +
(1-y)*(x*M_B2O3 + (1-x)*M_SiO2)


// molar volume

let Vm = M/rho


// Makishima–Mackenzie packing volumes

const V_Na2O = 11.2
const V_B2O3 = 12.2
const V_SiO2 = 14.6


// packing volume calculation (正确公式)

let Vt =
y*V_Na2O +
(1-y)*(x*V_B2O3 + (1-x)*V_SiO2)


// atomic packing fraction

let APF = Vt / Vm


// random packing correction

let RUPF = APF + 0.0032


// output

document.getElementById("M").innerHTML=M.toFixed(3)
document.getElementById("Vm").innerHTML=Vm.toFixed(3)
document.getElementById("Vt").innerHTML=Vt.toFixed(3)
document.getElementById("APF").innerHTML=APF.toFixed(4)
document.getElementById("RUPF").innerHTML=RUPF.toFixed(4)

}

</script>

</body>
</html>
