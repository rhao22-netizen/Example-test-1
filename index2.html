<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Glass Structure Calculator</title>

<style>
body{
font-family:Arial;
margin:40px;
}

table{
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #999;
padding:6px 10px;
text-align:center;
}

input{
width:70px;
}

</style>
</head>

<body>

<h2>Na2O – B2O3 – SiO2 Glass Calculator</h2>

<p>Enter composition and density</p>

<table>
<tr>
<th>x (B2O3 fraction)</th>
<th>y (Na2O fraction)</th>
<th>Density (g/cm³)</th>
</tr>

<tr>
<td><input id="x" value="0.3"></td>
<td><input id="y" value="0.33"></td>
<td><input id="rho" value="2.4"></td>
</tr>

</table>

<button onclick="calculate()">Calculate</button>

<h3>Results</h3>

<table>

<tr>
<th>Property</th>
<th>Value</th>
</tr>

<tr>
<td>Molar Mass</td>
<td id="M"></td>
</tr>

<tr>
<td>Molar Volume</td>
<td id="Vm"></td>
</tr>

<tr>
<td>Na atoms</td>
<td id="Na"></td>
</tr>

<tr>
<td>B atoms</td>
<td id="B"></td>
</tr>

<tr>
<td>Si atoms</td>
<td id="Si"></td>
</tr>

<tr>
<td>O atoms</td>
<td id="O"></td>
</tr>

<tr>
<td>Total atoms</td>
<td id="Total"></td>
</tr>

<tr>
<td>APF</td>
<td id="APF"></td>
</tr>

<tr>
<td>RUPF</td>
<td id="RUPF"></td>
</tr>

</table>


<script>

function calculate(){

let x=parseFloat(document.getElementById("x").value)
let y=parseFloat(document.getElementById("y").value)
let rho=parseFloat(document.getElementById("rho").value)


// molar mass

let M_Na2O=61.98
let M_B2O3=69.62
let M_SiO2=60.08

let M =
y*M_Na2O +
(1-y)*( x*M_B2O3 + (1-x)*M_SiO2 )


// molar volume

let Vm = M/rho



// atom numbers

let Na = 2*y
let B  = 2*(1-y)*x
let Si = (1-y)*(1-x)
let O  = y + 3*(1-y)*x + 2*(1-y)*(1-x)

let total = Na+B+Si+O



// Shannon radii (Å)

let rNa=1.02
let rB=0.11
let rSi=0.26
let rO=1.40


// sphere volume

function vol(r){

return (4/3)*Math.PI*Math.pow(r,3)

}


// packing

let Vatom =
Na*vol(rNa)+
B*vol(rB)+
Si*vol(rSi)+
O*vol(rO)


// convert Å³ → cm³

Vatom=Vatom*1e-24*6.022e23


let APF = Vatom/Vm


// simplified RUPF

let RUPF = APF/(1+APF)


// output

document.getElementById("M").innerText=M.toFixed(3)
document.getElementById("Vm").innerText=Vm.toFixed(3)

document.getElementById("Na").innerText=Na.toFixed(3)
document.getElementById("B").innerText=B.toFixed(3)
document.getElementById("Si").innerText=Si.toFixed(3)
document.getElementById("O").innerText=O.toFixed(3)

document.getElementById("Total").innerText=total.toFixed(3)

document.getElementById("APF").innerText=APF.toFixed(4)
document.getElementById("RUPF").innerText=RUPF.toFixed(4)

}

</script>

</body>
</html>
