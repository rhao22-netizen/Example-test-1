<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Glass Structure Calculator</title>

<style>

body{
font-family:Arial;
margin:40px;
background:#f4f6f8;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:900px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
}

table{
border-collapse:collapse;
margin-top:20px;
width:100%;
}

td,th{
border:1px solid #aaa;
padding:6px;
text-align:center;
}

input{
width:90px;
padding:4px;
}

button{
margin-top:10px;
padding:10px 20px;
background:#2f6ed6;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>


<body>

<div class="container">

<h1>Na₂O – B₂O₃ – SiO₂ Glass Structure Calculator</h1>

<p>Input Na₂O fraction and density</p>

<label>y (Na₂O fraction)</label>
<input id="y" value="0.33">

<label>Density (g/cm³)</label>
<input id="rho" value="2.52">

<br><br>

<button onclick="generate()">Generate Table</button>

<table id="table">

<tr>

<th>x</th>
<th>Molar Mass</th>
<th>Molar Volume</th>
<th>Packing Volume</th>
<th>APF</th>
<th>RUPF</th>

</tr>

</table>

</div>


<script>

function generate(){

let y=parseFloat(document.getElementById("y").value)

let rho=parseFloat(document.getElementById("rho").value)

const M_Na2O=61.98
const M_B2O3=69.62
const M_SiO2=60.08

const V_Na2O=11.2
const V_B2O3=13.3
const V_SiO2=26.9

let table=document.getElementById("table")

table.innerHTML=

`<tr>
<th>x</th>
<th>Molar Mass</th>
<th>Molar Volume</th>
<th>Packing Volume</th>
<th>APF</th>
<th>RUPF</th>
</tr>`

for(let x=0;x<=1.0001;x+=0.05){

let M=

y*M_Na2O+
(1-y)*(x*M_B2O3+(1-x)*M_SiO2)

let Vm=M/rho

let Vt=

y*V_Na2O+
(1-y)*(x*V_B2O3+(1-x)*V_SiO2)

let APF=Vt/Vm

let RUPF=APF+0.0032

let row=

`<tr>

<td>${x.toFixed(2)}</td>
<td>${M.toFixed(3)}</td>
<td>${Vm.toFixed(3)}</td>
<td>${Vt.toFixed(3)}</td>
<td>${APF.toFixed(4)}</td>
<td>${RUPF.toFixed(4)}</td>

</tr>`

table.innerHTML+=row

}

}

</script>

</body>

</html>
