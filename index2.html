<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Glass Structure Calculator (MM Model)</title>

<style>

body{
font-family:Arial;
margin:40px;
background:#f5f6fa;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:900px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
}

table{
border-collapse:collapse;
margin-top:20px;
width:100%;
}

td,th{
border:1px solid #aaa;
padding:6px;
text-align:center;
}

input{
width:80px;
padding:4px;
}

button{
margin-top:10px;
padding:10px 20px;
background:#2f6ed6;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>Na₂O–B₂O₃–SiO₂ Glass Calculator</h1>

<p>Makishima–Mackenzie Model</p>

<label>Na₂O fraction (y)</label>
<input id="y" value="0.33">

<button onclick="generate()">Generate Table</button>

<table id="table">

<tr>
<th>x</th>
<th>Density</th>
<th>Molar Mass</th>
<th>Molar Volume</th>
<th>Packing Volume</th>
<th>APF</th>
<th>RUPF</th>
</tr>

</table>

</div>

<script>

function generate(){

let y=parseFloat(document.getElementById("y").value)

const M_Na2O=61.98
const M_B2O3=69.62
const M_SiO2=60.08

const V_Na2O=11.2
const V_B2O3=13.3
const V_SiO2=26.9


// density table (replace with your real data)

const densityTable={

0.0:2.20,
0.1:2.30,
0.2:2.40,
0.3:2.52,
0.4:2.60,
0.5:2.66,
0.6:2.70,
0.7:2.73,
0.8:2.75,
0.9:2.77,
1.0:2.78

}


// interpolation

function density(x){

let keys=Object.keys(densityTable).map(Number)

for(let i=0;i<keys.length-1;i++){

let x1=keys[i]
let x2=keys[i+1]

if(x>=x1 && x<=x2){

let y1=densityTable[x1]
let y2=densityTable[x2]

return y1+(y2-y1)*(x-x1)/(x2-x1)

}

}

return densityTable[keys[keys.length-1]]

}


let table=document.getElementById("table")

table.innerHTML=

`<tr>
<th>x</th>
<th>Density</th>
<th>Molar Mass</th>
<th>Molar Volume</th>
<th>Packing Volume</th>
<th>APF</th>
<th>RUPF</th>
</tr>`


for(let x=0;x<=1.0001;x+=0.05){

let rho=density(x)

let M=

y*M_Na2O+
(1-y)*(x*M_B2O3+(1-x)*M_SiO2)

let Vm=M/rho

let Vt=

y*V_Na2O+
(1-y)*(x*V_B2O3+(1-x)*V_SiO2)

let APF=Vt/Vm

let RUPF=APF+0.0032


table.innerHTML+=`

<tr>

<td>${x.toFixed(2)}</td>
<td>${rho.toFixed(3)}</td>
<td>${M.toFixed(3)}</td>
<td>${Vm.toFixed(3)}</td>
<td>${Vt.toFixed(3)}</td>
<td>${APF.toFixed(4)}</td>
<td>${RUPF.toFixed(4)}</td>

</tr>

`

}

}

</script>

</body>
</html>
