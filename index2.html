<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Na2O-B2O3-SiO2 Glass Calculator</title>
<style>
body{
  font-family:Arial;
  margin:40px;
  background:#f4f6f8;
}
.container{
  background:white;
  padding:30px;
  border-radius:10px;
  max-width:700px;
  box-shadow:0 4px 20px rgba(0,0,0,0.1);
}
table{
  border-collapse:collapse;
  margin-top:20px;
}
td,th{
  border:1px solid #aaa;
  padding:8px 12px;
  text-align:center;
}
input{
  width:90px;
  padding:4px;
}
button{
  margin-top:10px;
  padding:10px 20px;
  background:#2f6ed6;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
  <h2>Na2O – B2O3 – SiO2 Glass Calculator</h2>
  <p>Enter composition and density</p>

  <table>
    <tr>
      <th>x (B2O3 fraction)</th>
      <th>y (Na2O fraction)</th>
      <th>Density (g/cm³)</th>
    </tr>
    <tr>
      <td><input id="x" value="0.3"></td>
      <td><input id="y" value="0.33"></td>
      <td><input id="rho" value="2.52"></td>
    </tr>
  </table>

  <button onclick="calculate()">Calculate</button>

  <h3>Results</h3>

  <table>
    <tr>
      <th>Property</th>
      <th>Value</th>
    </tr>
    <tr>
      <td>Molar Mass</td>
      <td id="M"></td>
    </tr>
    <tr>
      <td>Molar Volume</td>
      <td id="Vm"></td>
    </tr>
    <tr>
      <td>APF</td>
      <td id="APF"></td>
    </tr>
    <tr>
      <td>RUPF</td>
      <td id="RUPF"></td>
    </tr>
  </table>
</div>

<script>
function calculate(){

let x=parseFloat(document.getElementById("x").value)
let y=parseFloat(document.getElementById("y").value)
let rho=parseFloat(document.getElementById("rho").value)

const NA = 6.022e23

// molar masses
const M_Na2O = 61.98
const M_B2O3 = 69.62
const M_SiO2 = 60.08

// molar mass
let M =
y*M_Na2O +
(1-y)*(x*M_B2O3 + (1-x)*M_SiO2)

// molar volume
let Vm = M/rho

// number of atoms
let nNa = 2*y
let nB  = 2*x*(1-y)
let nSi = (1-x)*(1-y)
let nO  = y + 3*x*(1-y) + 2*(1-x)*(1-y)

// ionic radii (Å)
let rNa = 1.02
let rB  = 0.11
let rSi = 0.26
let rO  = 1.40

// sphere volume Å³
function vol(r){
return (4/3)*Math.PI*Math.pow(r,3)
}

// atomic volume
let Vatoms =
nNa*vol(rNa) +
nB*vol(rB) +
nSi*vol(rSi) +
nO*vol(rO)

// convert Å³ → cm³
Vatoms = Vatoms*1e-24*NA

// APF
let APF = Vatoms / Vm

// RUPF
let RUPF = APF + 0.0032

// output
document.getElementById("M").innerHTML=M.toFixed(3)
document.getElementById("Vm").innerHTML=Vm.toFixed(3)
document.getElementById("Vt").innerHTML=Vatoms.toFixed(3)
document.getElementById("APF").innerHTML=APF.toFixed(4)
document.getElementById("RUPF").innerHTML=RUPF.toFixed(4)

}
</script>

</body>
</html>
